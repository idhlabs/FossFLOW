name: Deploy_ando-server

on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        #hola
      - name: build
        uses: |
              ./docker compose up -d --build
      - name: healthcheck container
        run: |
          sleep 6
          docker ps | grep foss
          docker logs foss
